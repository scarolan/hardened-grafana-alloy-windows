services:
  # Local Prometheus — receives metrics via remote_write from Alloy
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=1h"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Synthetic metrics fixture server for relabeling rule testing
  fixture-server:
    image: python:3.12-slim
    working_dir: /fixtures
    command: ["python", "fixture_server.py"]
    volumes:
      - ./fixtures:/fixtures:ro
    expose:
      - "9999"

  # Grafana Alloy under test
  # NOTE: The Windows exporter block is patched out (can't run on Linux).
  # Alloy only processes synthetic metrics through the relabeling pipeline.
  alloy:
    image: grafana/alloy:latest
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--stability.level=generally-available"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./config.alloy.test:/etc/alloy/config.alloy:ro
    environment:
      # Dummy env vars (endpoints are patched in config.alloy.test)
      - GCLOUD_RW_API_KEY=not-used
      - GRAFANA_METRICS_URL=not-used
      - GRAFANA_METRICS_USERNAME=not-used
      - GRAFANA_LOGS_URL=not-used
      - GRAFANA_LOGS_USERNAME=not-used
      - GRAFANA_FLEET_URL=not-used
      - GRAFANA_FLEET_INSTANCE_ID=not-used
    depends_on:
      prometheus:
        condition: service_healthy
      fixture-server:
        condition: service_started

  # Test runner — waits for data, then runs assertions
  test-runner:
    image: python:3.12-slim
    working_dir: /tests
    command: >
      bash -c "
        pip install -q -r requirements.txt &&
        python -m pytest -v --tb=short test_runner.py
      "
    volumes:
      - ./test_runner.py:/tests/test_runner.py:ro
      - ./requirements.txt:/tests/requirements.txt:ro
      - ../shared:/tests/shared:ro
      - ../../config.alloy:/tests/config.alloy:ro
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    depends_on:
      - alloy

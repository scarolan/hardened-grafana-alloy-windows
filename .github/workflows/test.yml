name: Test Alloy Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tier1:
    name: "Tier 1: Docker Tests (Relabeling Pipeline)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint config syntax
        run: make lint

      - name: Run Tier 1 tests
        run: make test-tier1
